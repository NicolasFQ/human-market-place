<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUMAN.EXE IA</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="top-bar">
    <div class="logo">
      <img src="assets/logo.png" alt="HUMAN.EXE Logo">
    </div>
    <div class="search-bar">
      <input type="text" placeholder="Procurar skins, acessórios, passes...">
      <button class="search-btn">
        <img src="assets/search.png" alt="ícone de pesquisa">
      </button>
    </div>
    <div class="icons">
      <span><img src="assets/chat.png" alt="Chat com IA"></span>
      <span><img src="assets/carrinho.png" alt="Carrinho"></span>
      <span><img src="assets/exclusivo.png" alt="Plano exclusivo"></span>
      <a href="#">Login | Sign up</a>
    </div>
  </header>

  <main class="content">
    <div class="back">
      <span><img src="./assets/seta.png" alt="Voltar">VOLTAR</span>
    </div>
    <div class="limit">USOS RESTANTES: 3</div>

    <div class="visual-icon">
      <img src="assets/robo.png" alt="Item visual">
    </div>

    <h2 class="subtitle">
      SELECIONE O PERSONAGEM QUE VOCÊ DESEJA CRIAR UM VISUAL ÚNICO
    </h2>

    <div class="characters">
      <div class="char" data-name="Ana Clara">
        <img src="assets/ana.png" alt="Ana Clara">
        <p>ANA CLARA</p>
      </div>
      <div class="char" data-name="Winny">
        <img src="assets/winny.png" alt="Winny">
        <p>WINNY</p>
      </div>
      <div class="char" data-name="Yasmin">
        <img src="assets/yas.png" alt="Yasmin">
        <p>YASMIN</p>
      </div>
      <div class="char" data-name="Vitor">
        <img src="assets/vitor.png" alt="Vitor">
        <p>VITOR</p>
      </div>
      <div class="char" data-name="Nicolas">
        <img src="assets/nicolas.png" alt="Nicolas">
        <p>NICOLAS</p>
      </div>
    </div>

    <div id="continue-btn" class="continue hidden">
      <a href="visual.html">
        <img src="assets/continuar.png" alt="Continuar">
      </a>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
